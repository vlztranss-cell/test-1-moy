# GitHub Pages config: исключаем приватные/служебные файлы из публикации.
# Эти файлы остаются в репо, но НЕ доступны по botisk.ru.
exclude:
  - dashboard.html      # админ-дашборд — живёт на VPS за basic_auth
  - .env
  - scripts/
  - tests/
  - n8n-workflows/      # JSON-исходники workflow + миграции БД
  - control.py
  # docs/ — исключаем кроме брифингов
  - docs/AD_LAUNCH.md
  - docs/DIRECT_CAMPAIGN_SETUP.md
  - docs/BOT_REFERRAL_INTEGRATION.md
  - docs/REFERRAL_CASH_PROGRAM.md
  - docs/TRAFFIC_PLAYBOOK.md
  - CONTENTS.md
  - PROJECTS_SUMMARY.md
  - PROJECTS_DETAILED.md
# blog/index.html и blog/*.html НЕ исключаем — они нужны на botisk.ru для SEO
# sitemap.xml и robots.txt НЕ исключаем — они нужны поисковикам

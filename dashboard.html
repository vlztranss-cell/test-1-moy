<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        h1 { font-size: 28px; font-weight: 700; }
        .stats {
            display: flex;
            gap: 16px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px 24px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #58a6ff;
        }
        .stat-card .label {
            font-size: 12px;
            color: #8b949e;
            margin-top: 4px;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .project-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .project-card:hover { border-color: #58a6ff; }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .project-name {
            font-size: 18px;
            font-weight: 600;
        }
        .project-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        .badge-telegram-bot { background: #1d3a5c; color: #58a6ff; }
        .badge-marketplace { background: #2d1f3d; color: #bc8cff; }
        .badge-print { background: #1f3d2d; color: #7ce38b; }
        .badge-seo { background: #3d3a1f; color: #e3d37c; }
        .badge-other { background: #2d2d2d; color: #8b949e; }
        .project-desc {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 8px;
        }
        .project-info {
            font-size: 12px;
            color: #6e7681;
            margin-bottom: 12px;
            line-height: 1.5;
            border-left: 2px solid #30363d;
            padding-left: 10px;
        }
        .project-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }
        .project-stat {
            font-size: 12px;
            color: #8b949e;
        }
        .project-stat span { font-weight: 700; color: #e1e4e8; }
        .project-stat.active span { color: #3fb950; }
        .workflows-list {
            border-top: 1px solid #21262d;
            padding-top: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .project-card.expanded .workflows-list {
            max-height: 500px;
        }
        .wf-item-card {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            transition: border-color 0.2s;
        }
        .wf-item-card:hover {
            border-color: #58a6ff;
        }
        .wf-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .wf-name {
            color: #e1e4e8;
            font-size: 13px;
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .wf-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }
        .wf-badge.on { background: #0f2d1a; color: #3fb950; }
        .wf-badge.off { background: #2d2d2d; color: #8b949e; }
        .wf-description {
            font-size: 11px;
            color: #8b949e;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .wf-actions {
            display: flex;
            gap: 6px;
        }
        .wf-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .wf-status.active { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
        .wf-status.inactive { background: #484f58; }
        .wf-status.archived { background: #6e4000; }
        .toggle-btn {
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        .toggle-btn:hover { border-color: #58a6ff; color: #58a6ff; }
        .refresh-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: #30363d; border-color: #58a6ff; }
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b949e;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .timestamp {
            font-size: 12px;
            color: #484f58;
            margin-top: 24px;
            text-align: center;
        }
        .control-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .action-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .action-btn.start:hover { border-color: #3fb950; color: #3fb950; }
        .action-btn.stop:hover { border-color: #f85149; color: #f85149; }
        .action-btn.open:hover { border-color: #58a6ff; color: #58a6ff; }
        .action-btn.download:hover { border-color: #bc8cff; color: #bc8cff; }
        .action-btn:disabled { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Project Dashboard</h1>
        <button class="refresh-btn" onclick="loadData()">Обновить</button>
    </div>

    <div class="stats" id="stats"></div>
    <div class="projects-grid" id="projects">
        <div class="loading">Загрузка данных</div>
    </div>
    <div class="timestamp" id="timestamp"></div>

    <script>
        const API_URL = 'https://n8n.24isk.ru/webhook/dashboard';
        const N8N_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiI5YzAwMmRkNC1mMDI2LTQ1MWQtYWZmMC0wYzNlNmU2MmE0MjgiLCJpc3MiOiJuOG4iLCJhdWQiOiJwdWJsaWMtYXBpIiwianRpIjoiMTM3M2VhYTctYjBlNC00ZjM0LWJkYjQtYzg0OWFlMDBlNzU1IiwiaWF0IjoxNzc5MDU0NTAzLCJleHAiOjE3ODY4Mjc2MDB9.n9QAgjQ_6Jags29Rb4qE8okSOVw_386xgMNYnIFru1A';
        const N8N_BASE = 'https://n8n.24isk.ru';

        async function loadData() {
            const projectsEl = document.getElementById('projects');
            projectsEl.innerHTML = '<div class="loading">Загрузка данных</div>';

            try {
                const resp = await fetch(API_URL);
                const data = await resp.json();
                renderStats(data);
                renderProjects(data.projects);
                document.getElementById('timestamp').textContent =
                    `Обновлено: ${new Date(data.timestamp).toLocaleString('ru-RU')}`;
            } catch (e) {
                projectsEl.innerHTML = `<div class="loading" style="color:#f85149">Ошибка загрузки: ${e.message}</div>`;
            }
        }

        function renderStats(data) {
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="number">${data.totalWorkflows}</div>
                    <div class="label">Всего workflows</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#3fb950">${data.activeWorkflows}</div>
                    <div class="label">Активных</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#8b949e">${data.totalWorkflows - data.activeWorkflows}</div>
                    <div class="label">Остановлены</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#bc8cff">${data.projects.length}</div>
                    <div class="label">Проектов</div>
                </div>
            `;
        }

        function renderProjects(projects) {
            const el = document.getElementById('projects');
            el.innerHTML = projects
                .filter(p => p.totalCount > 0 || p.activeCount > 0)
                .map(p => `
                <div class="project-card" onclick="this.classList.toggle('expanded')">
                    <div class="project-header">
                        <div class="project-name">${p.name}</div>
                        <span class="project-badge badge-${p.category}">${p.category}</span>
                    </div>
                    <div class="project-desc">${p.description}</div>
                    <div class="project-info">${getProjectInfo(p.name)}</div>
                    <div class="project-stats">
                        <div class="project-stat active">Активных: <span>${p.activeCount}</span></div>
                        <div class="project-stat">Всего: <span>${p.totalCount}</span></div>
                        ${p.archivedCount ? `<div class="project-stat">Архив: <span>${p.archivedCount}</span></div>` : ''}
                    </div>
                    <button class="toggle-btn">Показать workflows</button>
                    <div class="workflows-list">
                        ${p.workflows.filter(w => !w.archived).map(w => `
                            <div class="wf-item-card" onclick="event.stopPropagation()">
                                <div class="wf-item-header">
                                    <div class="wf-status ${w.active ? 'active' : 'inactive'}"></div>
                                    <span class="wf-name">${w.name}</span>
                                    <span class="wf-badge ${w.active ? 'on' : 'off'}">${w.active ? 'ON' : 'OFF'}</span>
                                </div>
                                <div class="wf-description">${getWfInfo(w.name)}</div>
                                <div class="wf-actions">
                                    ${w.active
                                        ? `<button class="action-btn stop" onclick="toggleWf('${w.id}','deactivate',this)">Выключить</button>`
                                        : `<button class="action-btn start" onclick="toggleWf('${w.id}','activate',this)">Включить</button>`
                                    }
                                    <a class="action-btn open" href="${N8N_BASE}/workflow/${w.id}" target="_blank">Открыть в n8n</a>
                                    <button class="action-btn download" onclick="downloadWf('${w.id}','${w.name.replace(/'/g,'')}')">Скачать JSON</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function toggleWf(id, action, btn) {
            btn.disabled = true;
            btn.textContent = '...';
            try {
                await fetch(`${N8N_BASE}/api/v1/workflows/${id}/${action}`, {
                    method: 'POST',
                    headers: { 'X-N8N-API-KEY': N8N_API_KEY }
                });
                await loadData();
            } catch (e) {
                alert('Ошибка: ' + e.message);
                btn.disabled = false;
            }
        }

        async function downloadWf(id, name) {
            try {
                const resp = await fetch(`${N8N_BASE}/api/v1/workflows/${id}`, {
                    headers: { 'X-N8N-API-KEY': N8N_API_KEY }
                });
                const data = await resp.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${name.replace(/[^a-zA-Z0-9_-]/g, '_')}.json`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('Ошибка скачивания: ' + e.message);
            }
        }

        function getWfInfo(name) {
            const wfInfo = {
                // AI Photo2Video Bot
                'AI_Photo2Video_Bot_v6_1_5_Hailuo_primary_ready': 'Основной бот. Принимает фото → генерирует видео через Hailuo (основной) и Kling (резерв) → отправляет пользователю. Оплата через ЮКассу, данные в PostgreSQL.',
                'AI_Photo2Video_FollowUp_v4_Growth': 'Рассылка неактивным пользователям. Проверяет БД, отправляет напоминания в Telegram для возврата пользователей.',
                'AI_Photo2Video_Admin_Stats': 'Ежедневная статистика для админа: кол-во пользователей, платежей, генераций. Отправляет отчёт в Telegram.',
                'AI_Photo2Video_Bot_v6_0_2_AdminGrant': 'Старая версия бота с ручной выдачей доступа админом. ВЫКЛЮЧЕН — замена v6_1_5.',
                'AI_Photo2Video_Bot_v6_1_1_PhotoVideoDemo': 'Версия с демо-режимом фото+видео. ВЫКЛЮЧЕН — замена v6_1_5.',
                'AI_Photo2Video_Bot_v6_1_5_WelcomeEditInPlace': 'Версия с редактируемым приветствием. ВЫКЛЮЧЕН — замена Hailuo_primary_ready.',
                'AI_Photo2Video_Bot_v3_PG': 'Старая v3 на PostgreSQL. Остановлен 09.03.26.',
                'AI_Photo2Video_FollowUp_v3_PG': 'Старая v3 follow-up. Остановлен 09.03.26.',
                // iskPhotoAlive
                'iskPhotoAlive_bot': 'Тестовый бот @iskPhotoAlive_bot. Фото → видео через AIMLAPI (Kling 2.1). Без оплаты, без БД.',
                // Wildberries
                'WF_WB_CARD_CREATE v3': 'Создание карточек на WB. Каждые 2 мин берёт товары из Google Sheets, отправляет в WB Content API. Batch по 5 штук.',
                'WF_WB_CARD_CHECK': 'Проверка создания карточки. Каждые 5 мин опрашивает WB API — появилась ли карточка. Ставит статус PUBLISHED.',
                'WF_WB_PHOTO_UPLOAD v3': 'Загрузка фото на WB. Берёт фото из Yandex Disk, отправляет через WB Media API + размерная сетка.',
                'WF_WB_PRICES_STOCKS': 'Установка цен и остатков. Каждые 15 мин синхронизирует цены и остатки из Google Sheets → WB API.',
                'Cache WB Dictionaries': 'Кэш справочников WB (категории, цвета, размеры). Запуск вручную.',
                'WB_PHOTOS': 'Извлечение прямых ссылок на фото из публичных папок Yandex Disk.',
                'WB → Yandex': 'Синхронизация: скачивает фото из Google Drive, загружает в Yandex Disk в нужные папки.',
                // Print-on-Demand
                'WF1: Trend Scanner': 'Каждые 6 часов: SerpAPI (Google Trends) + Reddit → GPT-4o анализирует → записывает тренды в Sheets.',
                'WF2': 'Генерация принтов. GPT-4o пишет промпт → Ideogram 3.0 / Flux 1.1 / DALL-E создают PNG → загрузка в Drive.',
                'WF3': 'Контроль качества. Техпроверка (размер, формат) + GPT-4o Vision оценивает композицию и потенциал.',
                'WF4': 'Создание мокапов. Накладывает принт на шаблоны футболок через NanoBanana API.',
                'BACKFILL_PRINT_SCAN': 'Массовая генерация: принт + 5 мокапов (man black, woman black, detail и др.). 107 нод.',
                'WF_Fetch_Print_Area_Presets': 'Загрузка пресетов зон печати для мокапов.',
                'WF_Validate_Templates': 'Валидация шаблонов мокапов перед использованием.',
                // SEO
                'SEO Generator': 'Каждую минуту: берёт SKU → GPT-4o Vision смотрит фото → генерирует название, описание, ключевые слова для WB.',
                // Arbitrage
                'WF-ARB-2': 'Telegram-бот @twoDtraid_bot. Регистрация закупок через команды в чате. Данные в Google Sheets.',
                'WF-ARB-1: Email': 'Читает email (IMAP Yandex) с подтверждениями заказов → сверяет с базой → формирует поставку на WB.',
                'WF-ARB-1-TEST': 'Тестовая версия: только поиск и сверка, без реальной поставки на WB.',
                // Dashboard & Autopilot
                'Dashboard API': 'API для веб-дашборда. Собирает статусы всех workflows, группирует по проектам.',
                'Autopilot': 'Мониторинг 1 раз в день (9:00). Проверяет ошибки, перезапускает упавшие workflows, алертит в Telegram.',
            };
            // Match by substring
            for (const [key, val] of Object.entries(wfInfo)) {
                if (name.includes(key)) return val;
            }
            return '';
        }

        function getProjectInfo(name) {
            const info = {
                'AI Photo2Video Bot': 'Telegram-бот с оплатой через ЮКассу. Пользователь отправляет фото → бот генерирует видео через Hailuo/Kling → отправляет обратно. БД в PostgreSQL (72.56.96.64). Есть follow-up рассылки и админ-статистика.',
                'Wildberries Cards': 'Конвейер выгрузки товаров на WB. Google Sheets → создание карточки → проверка → загрузка фото из Yandex Disk → установка цен и остатков. Работает автоматически каждые 2-15 мин.',
                'Print-on-Demand': 'Полный цикл: сканирование трендов (SerpAPI + Reddit) → GPT-4o генерирует идеи → Ideogram/Flux создают принты → GPT Vision проверяет качество → NanoBanana делает мокапы.',
                'SEO Generator': 'GPT-4o Vision смотрит фото товара и генерирует название, описание, ключевые слова для карточек WB. Запускается каждую минуту, обрабатывает по 1 SKU.',
                'Arbitrage Bot': 'Telegram-бот @twoDtraid_bot для команды арбитража. Регистрация закупок, чтение email с заказами, сверка с базой, формирование поставок на WB.',
                'iskPhotoAlive Bot': 'Тестовый бот @iskPhotoAlive_bot. Оживление фото через AIMLAPI + Kling 2.1. Без оплаты, без БД — упрощённая версия основного бота.',
                'Other': 'Служебные workflows: дашборд API, автопилот мониторинга, тестовые агенты.'
            };
            return info[name] || '';
        }

        loadData();
    </script>
</body>
</html>
